spring:
  application:
    name: lingmo-studio-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    # session 配置
    session:
      store-type: redis
      # session 30 天过期
      timeout: 2592000
  # springdoc-openapi 配置
  springdoc:
    group-configs:
      - group: 'default'
        paths-to-match: '/**'
        packages-to-scan: tech.jxing.lingmostudiobackend.controller
  # knife4j 接口文档配置
  knife4j:
    enable: true
    setting:
      language: zh_cn
  # MyBatis-Flex 配置
  mybatis-flex:
    configuration:
      map-underscore-to-camel-case: false
server:
  port: 8567
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000