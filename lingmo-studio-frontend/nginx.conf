server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 专门为 SSE 进度接口开启的高优匹配（核心修复点）
    location ^~ /api/article/progress/ {
        # 转发到后端服务名（docker-compose 中的 service 名），千万不能带后面的路径和斜杠
        proxy_pass http://backend:8567;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 【极其关键】：关闭 Nginx 缓冲，让数据立刻流向前端
        proxy_buffering off;
        proxy_cache off;

        # 【极其关键】：强制长连接，绕过任何可能的全局 map 干扰
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 延长读取超时时间，防止 AI 生成过程中的空闲断开
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 禁用分块传输编码的缓冲
        chunked_transfer_encoding on;
    }

    # 反向代理后端 API
    location /api/ {
        proxy_pass http://backend:8567;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

