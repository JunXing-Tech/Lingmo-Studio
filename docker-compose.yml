version: '3.8'

services:
  backend:
    build:
      context: ./lingmo-studio-backend
      dockerfile: Dockerfile
    container_name: lingmo-backend
    ports:
      - "8567:8567"
    environment:
      - TZ=Asia/Shanghai
      # JVM options based on server memory (4vCPU 4GiB)
      - JAVA_OPTS=-Xms1g -Xmx1g
    networks:
      - lingmo-net
    restart: always

  frontend:
    build:
      context: ./lingmo-studio-frontend
      dockerfile: Dockerfile
    container_name: lingmo-frontend
    ports:
      - "80:80"
    networks:
      - lingmo-net
    depends_on:
      - backend
    restart: always

networks:
  lingmo-net:
    driver: bridge
